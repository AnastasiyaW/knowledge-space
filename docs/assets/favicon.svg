<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Phase 1 (0-40%): explode from center to positions -->
  <!-- Phase 2 (40-100%): slow drift at positions with links visible -->

  <!-- Links: fade in at 40%, stay visible during drift -->
  <line stroke="#fff" stroke-width="1.2" opacity="0.2">
    <animate attributeName="x1" values="32;28;28;30;28" keyTimes="0;0.4;0.6;0.8;1" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="y1" values="32;22;22;20;22" keyTimes="0;0.4;0.6;0.8;1" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="32;42;42;44;42" keyTimes="0;0.4;0.6;0.8;1" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="32;30;30;28;30" keyTimes="0;0.4;0.6;0.8;1" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;0.2;0.15;0.2" keyTimes="0;0.35;0.45;0.7;1" dur="5s" repeatCount="indefinite"/>
  </line>
  <line stroke="#fff" stroke-width="1" opacity="0.15">
