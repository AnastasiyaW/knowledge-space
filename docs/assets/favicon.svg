    <animate attributeName="y1" values="32;30;30;28;30" keyTimes="0;0.4;0.6;0.8;1" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="32;50;50;52;50" keyTimes="0;0.4;0.6;0.8;1" dur="5s" repeatCount="indefinite"/>
