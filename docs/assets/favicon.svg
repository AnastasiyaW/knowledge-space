    <animate attributeName="y1" values="32;30;30;32;30" keyTimes="0;0.4;0.6;0.8;1" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="32;38;38;40;38" keyTimes="0;0.4;0.6;0.8;1" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="32;46;46;48;46" keyTimes="0;0.4;0.6;0.8;1" dur="5s" repeatCount="indefinite"/>
