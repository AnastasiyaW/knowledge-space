    <animate attributeName="cy" values="32;10;24;22;26;24" keyTimes="0;0.2;0.4;0.6;0.8;1" dur="5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 1 1;0 0 0.2 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
